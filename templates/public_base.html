<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ bot_name }} - информация</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body class="public-body">
    <main class="public-shell">
      <section class="public-hero card">
        <div class="eyebrow">LEGAL INFO</div>
        <h1>{{ bot_name }}</h1>
        {% if brand_tagline %}
        <p class="muted">{{ brand_tagline }}</p>
        {% endif %}
      </section>

      <nav class="public-nav card">
        {% for item in nav_items %}
        <a href="{{ item.url }}" class="public-nav-link">{{ item.title }}</a>
        {% endfor %}
      </nav>

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
